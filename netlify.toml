
[build]
  # Build command for Expo web
  command = "npx expo export -p web"
  # Output directory after build
  publish = "dist"

[build.environment]
  # Node version for all contexts
  NODE_VERSION = "20"

[context.production.environment]
  # Ensure Node 20+ for production builds (supports ES2023 features like Array.prototype.toReversed)
  NODE_VERSION = "20"

[[redirects]]
  # Handle all routes for client-side routing
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Apply headers to all routes
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Cache control for static assets
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Don't cache HTML files
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Cache control for API calls
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
